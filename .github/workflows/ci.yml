name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build, vet & test
    runs-on: ubuntu-latest

    # storage/redis_test.go runs integration tests against a live Redis on
    # 127.0.0.1:6379, so we provide one as a service container.
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Single source of truth: the version in go.mod.
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit + storage integration, with race detector)
        run: go test -race -cover ./...
