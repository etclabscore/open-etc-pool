name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build, vet & test
    runs-on: ubuntu-latest

    # storage/redis_test.go runs integration tests against a live Redis on
    # 127.0.0.1:6379, so we provide one as a service container.
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Single source of truth: the version in go.mod.
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit + storage integration, with race detector)
        run: go test -race -cover ./...

  nix:
    name: Nix build (package + OCI image)
    runs-on: ubuntu-latest
    env:
      NIX_CONFIG: "experimental-features = nix-command flakes"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35

      # Cache /nix/store across runs. Note: PRs from forks get a read-only
      # cache token, so the cache is populated by pushes to master and merely
      # restored on PRs.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'go.mod', 'go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G

      - name: Build package
        run: nix build .#default -L

      - name: Build OCI image
        run: nix build .#dockerImage -L

      - name: Flake check
        run: nix flake check -L
